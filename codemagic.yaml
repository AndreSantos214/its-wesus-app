workflows:
  ios-capacitor-release:
    name: iOS Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: ios-app

    environment:
      node: latest
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.itswesus.portal

      vars:
        BUNDLE_ID: "com.itswesus.portal"
        APP_NAME: "It's Wesus"
        APP_VERSION: "1.0"
        IOS_DEPLOYMENT_TARGET: "15.0"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install npm dependencies
        script: |
          echo "Installing npm dependencies..."
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi
          chmod -R +x node_modules/.bin || true

      - name: Sync Capacitor iOS
        script: |
          echo "Syncing Capacitor iOS..."
          npx cap sync ios

      - name: Validate iOS project files
        script: |
          echo "Validating iOS project..."

          if [ ! -d "ios/App" ]; then
            echo "ERROR: ios/App folder not found."
            exit 1
          fi

          if [ ! -f "ios/App/Podfile" ]; then
            echo "ERROR: ios/App/Podfile file not found."
            echo "Create it locally with npx cap add ios / npx cap sync ios and push it to GitHub."
            exit 1
          fi

          if [ -d "ios/App/Podfile" ]; then
            echo "ERROR: ios/App/Podfile is a directory, but it must be a file."
            exit 1
          fi

          echo "iOS project looks OK."

      - name: Force iOS deployment target
        script: |
          echo "Forcing iOS deployment target to ${IOS_DEPLOYMENT_TARGET}..."

          ruby -pi -e "gsub(/platform :ios, '[0-9.]+'/, \"platform :ios, '${IOS_DEPLOYMENT_TARGET}'\")" ios/App/Podfile

          echo "Podfile:"
          cat ios/App/Podfile

      - name: Install CocoaPods dependencies
        script: |
          echo "Installing CocoaPods dependencies..."
          cd ios/App
          pod install --repo-update

      - name: Set app version and build number
        script: |
          echo "Setting app version and build number..."
          cd ios/App

          BUILD_NUMBER_VALUE="${BUILD_NUMBER:-1}"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${APP_VERSION}" App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${APP_VERSION}" App/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${BUILD_NUMBER_VALUE}" App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${BUILD_NUMBER_VALUE}" App/Info.plist

          echo "Version: ${APP_VERSION}"
          echo "Build number: ${BUILD_NUMBER_VALUE}"

      - name: Initialize keychain
        script: |
          echo "Initializing keychain..."
          keychain initialize

      - name: Fetch Apple signing files
        script: |
          echo "Fetching Apple signing files..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose

      - name: Add signing certificates to keychain
        script: |
          echo "Adding certificates to keychain..."
          keychain add-certificates

      - name: Apply signing settings to Xcode project
        script: |
          echo "Applying signing settings..."
          xcode-project use-profiles

      - name: Build IPA
        script: |
          echo "Building IPA..."
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/**/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false